olist_project:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: dbt_dev
      threads: 4
      timeout_seconds: 300
      location: "{{ env_var('GCP_LOCATION', 'US') }}"
      keyfile: "{{ env_var('GOOGLE_CREDENTIALS') }}"
      priority: interactive
