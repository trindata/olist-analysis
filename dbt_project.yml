# ============================================================================
# olist_project - dbt_project.yml
# Projeto de análise do dataset Olist Brazilian E-Commerce
# Warehouse: BigQuery | Orquestração: dbt Cloud
# ============================================================================

name: 'olist_project'
version: '1.0.0'
config-version: 2

# Profile gerenciado pelo dbt Cloud via UI (essa linha é ignorada no Cloud,
# mas mantida pra compatibilidade caso o projeto seja rodado local no futuro).
profile: 'default'

# ----------------------------------------------------------------------------
# Paths (defaults do dbt, sem alteração)
# ----------------------------------------------------------------------------
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ----------------------------------------------------------------------------
# Configuração de modelos por camada
# ----------------------------------------------------------------------------
# Arquitetura em 3 camadas:
#   staging      -> espelhos limpos das raws (1:1 com source, rename + cast)
#   intermediate -> joins e cálculos de domínio reutilizáveis (não persistem)
#   marts        -> tabelas finais consumidas pelo Looker Studio
#
# Cada camada tem dataset próprio no BigQuery via +schema.
# Materializações escolhidas por custo/benefício de cada camada.
# ----------------------------------------------------------------------------

models:
  olist_project:

    # Staging: 1 view por tabela raw. Custo zero de storage, sempre fresca.
    staging:
      +materialized: view
      +schema: staging

    # Intermediate: ephemeral vira CTE inline nos modelos que dão ref() nele.
    # Não cria objeto no BigQuery, mas mantém lineage visível e código modular.
    intermediate:
      +materialized: ephemeral

    # Marts: tabelas materializadas, otimizadas pra leitura no Looker.
    # Subpastas operational/ e commercial/ herdam essas configs.
    marts:
      +materialized: table
      +schema: marts